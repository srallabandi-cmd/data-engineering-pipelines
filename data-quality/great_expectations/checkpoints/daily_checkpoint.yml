# Great Expectations Daily Checkpoint
#
# Validates the events dataset after the daily ETL pipeline completes.
# Runs the events_suite expectations and triggers store + Slack notifications.

name: daily_checkpoint
config_version: 1.0

template_name: null
module_name: great_expectations.checkpoint
class_name: Checkpoint

run_name_template: "daily_events_%Y%m%d_%H%M%S"

expectation_suite_name: null  # Specified per validation below

action_list:
  # Store validation results in the configured results store
  - name: store_validation_result
    action:
      class_name: StoreValidationResultAction

  # Store evaluation parameters for cross-validation reference
  - name: store_evaluation_params
    action:
      class_name: StoreEvaluationParametersAction

  # Update Data Docs (HTML reports) after each validation
  - name: update_data_docs
    action:
      class_name: UpdateDataDocsAction
      site_names:
        - local_site
        - s3_site

  # Send Slack notification on failure
  - name: send_slack_notification_on_failure
    action:
      class_name: SlackNotificationAction
      slack_webhook: ${SLACK_GE_WEBHOOK_URL}
      notify_on: failure
      notify_with:
        - local_site
      renderer:
        module_name: great_expectations.render.renderer.slack_renderer
        class_name: SlackRenderer

  # Send email notification on failure
  - name: send_email_on_failure
    action:
      class_name: EmailAction
      notify_on: failure
      use_tls: true
      use_ssl: false
      smtp_address: ${SMTP_HOST}
      smtp_port: ${SMTP_PORT}
      sender_login: ${SMTP_USER}
      sender_password: ${SMTP_PASSWORD}
      sender_alias: "Great Expectations"
      receiver_emails: "data-alerts@example.com"

validations:
  # Validation 1: Events dataset
  - batch_request:
      datasource_name: warehouse_datasource
      data_connector_name: default_runtime_data_connector
      data_asset_name: events
      runtime_parameters:
        query: >
          SELECT *
          FROM warehouse.events
          WHERE ingestion_date = CURRENT_DATE - INTERVAL '1 day'
      batch_identifiers:
        default_identifier_name: daily_events
    expectation_suite_name: events_suite

evaluation_parameters:
  # Pass parameters that can be used in expectations
  execution_date: ${EXECUTION_DATE}
  environment: ${PIPELINE_ENV}
