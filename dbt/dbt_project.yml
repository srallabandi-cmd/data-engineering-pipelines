name: "data_engineering_pipelines"
version: "1.0.0"
config-version: 2

profile: "data_engineering_pipelines"

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

vars:
  execution_date: "{{ modules.datetime.datetime.now().strftime('%Y-%m-%d') }}"
  lookback_days: 90
  session_timeout_minutes: 30
  pii_hash_salt: "{{ env_var('DBT_PII_SALT', 'default-salt-change-in-prod') }}"

models:
  data_engineering_pipelines:
    +materialized: table
    +on_schema_change: "append_new_columns"

    staging:
      +materialized: incremental
      +schema: staging
      +tags:
        - "staging"
        - "daily"

    intermediate:
      +materialized: ephemeral
      +schema: intermediate
      +tags:
        - "intermediate"
        - "daily"

    marts:
      +materialized: table
      +schema: marts
      +tags:
        - "marts"
        - "daily"
      +persist_docs:
        relation: true
        columns: true

seeds:
  data_engineering_pipelines:
    +schema: seeds

snapshots:
  data_engineering_pipelines:
    +schema: snapshots
