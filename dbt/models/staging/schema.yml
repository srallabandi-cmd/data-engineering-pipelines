version: 2

sources:
  - name: raw
    description: "Raw data from the ingestion layer (Spark ETL output)."
    database: "{{ env_var('DBT_RAW_DATABASE', 'analytics') }}"
    schema: "{{ env_var('DBT_RAW_SCHEMA', 'raw') }}"
    loader: spark_etl
    loaded_at_field: ingested_at

    freshness:
      warn_after:
        count: 12
        period: hour
      error_after:
        count: 24
        period: hour

    tables:
      - name: events
        description: "Raw event stream from the application. One row per user interaction."
        columns:
          - name: event_id
            description: "Unique identifier for the event."
            tests:
              - not_null
              - unique
          - name: event_type
            description: "Type of event (page_view, click, scroll, purchase, signup, login, logout)."
            tests:
              - not_null
              - accepted_values:
                  values:
                    - page_view
                    - click
                    - scroll
                    - purchase
                    - signup
                    - login
                    - logout
          - name: user_id
            description: "User who triggered the event. Null for anonymous events."
          - name: event_timestamp
            description: "When the event occurred (UTC)."
            tests:
              - not_null
          - name: revenue
            description: "Revenue associated with the event (e.g., purchase amount)."
          - name: ingested_at
            description: "Timestamp when the record was ingested by the ETL pipeline."

      - name: users
        description: "Raw user profiles from the application database."
        columns:
          - name: user_id
            description: "Unique user identifier."
            tests:
              - not_null
              - unique
          - name: email
            description: "User email address (PII - hashed in staging)."
          - name: status
            description: "Account status code: A=active, I=inactive, S=suspended, D=deleted, P=pending."
          - name: created_at
            description: "When the user account was created."
            tests:
              - not_null

models:
  - name: stg_events
    description: >
      Cleaned and typed events from the raw source.
      Deduplicates by event_id (keeps latest ingested record).
      Incremental materialization with merge strategy.
    columns:
      - name: event_id
        description: "Unique event identifier."
        tests:
          - not_null
          - unique
      - name: event_type
        description: "Normalized event type."
        tests:
          - not_null
          - accepted_values:
              values:
                - page_view
                - click
                - scroll
                - purchase
                - signup
                - login
                - logout
      - name: user_id
        description: "User ID or 'anonymous' if not identified."
        tests:
          - not_null
      - name: event_timestamp
        description: "Parsed event timestamp (UTC)."
        tests:
          - not_null
      - name: event_date
        description: "Date extracted from event_timestamp."
        tests:
          - not_null
      - name: duration_ms
        description: "Event duration in milliseconds (0 if null)."
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true
      - name: revenue
        description: "Event revenue (0.0 if null)."
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true

  - name: stg_users
    description: >
      Cleaned user profiles with PII hashing. Status codes mapped to labels.
      Incremental by updated_at.
    columns:
      - name: user_id
        description: "Unique user identifier."
        tests:
          - not_null
          - unique
      - name: email_hash
        description: "SHA-256 hash of user email for privacy."
        tests:
          - not_null
      - name: user_status
        description: "Human-readable account status."
        tests:
          - not_null
          - accepted_values:
              values:
                - active
                - inactive
                - suspended
                - deleted
                - pending
                - unknown
      - name: created_at
        description: "Account creation timestamp."
        tests:
          - not_null
