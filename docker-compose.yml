---
# Full Local Development Stack
#
# Services:
#   - Kafka (KRaft mode, no Zookeeper)
#   - Schema Registry
#   - Kafka UI
#   - Spark Master + Worker
#   - PostgreSQL (warehouse)
#   - MinIO (S3-compatible storage)
#
# Usage:
#   docker compose up -d
#   docker compose logs -f kafka spark-master

services:
  # =========================================================================
  # Kafka (KRaft mode - no Zookeeper required)
  # =========================================================================
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    hostname: kafka
    container_name: dep-kafka
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_PROCESS_ROLES: "broker,controller"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # =========================================================================
  # Schema Registry
  # =========================================================================
  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    hostname: schema-registry
    container_name: dep-schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: "kafka:29092"
      SCHEMA_REGISTRY_LISTENERS: "http://0.0.0.0:8081"
      SCHEMA_REGISTRY_SCHEMA_COMPATIBILITY_LEVEL: "BACKWARD"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # =========================================================================
  # Kafka UI
  # =========================================================================
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    hostname: kafka-ui
    container_name: dep-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    ports:
      - "8082:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:29092"
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: "http://schema-registry:8081"
      KAFKA_CLUSTERS_0_METRICS_PORT: 9101
      DYNAMIC_CONFIG_ENABLED: "true"
    restart: unless-stopped

  # =========================================================================
  # Spark Master
  # =========================================================================
  spark-master:
    image: bitnami/spark:3.5
    hostname: spark-master
    container_name: dep-spark-master
    ports:
      - "7077:7077"
      - "8083:8080"
    environment:
      SPARK_MODE: master
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: 7077
      SPARK_MASTER_WEBUI_PORT: 8080
      SPARK_DAEMON_MEMORY: 1g
    volumes:
      - ./spark-jobs:/opt/spark-jobs:ro
      - spark-data:/opt/spark/work
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # =========================================================================
  # Spark Worker
  # =========================================================================
  spark-worker:
    image: bitnami/spark:3.5
    hostname: spark-worker
    container_name: dep-spark-worker
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: "spark://spark-master:7077"
      SPARK_WORKER_MEMORY: 4g
      SPARK_WORKER_CORES: 4
      SPARK_WORKER_WEBUI_PORT: 8081
    ports:
      - "8084:8081"
    volumes:
      - ./spark-jobs:/opt/spark-jobs:ro
      - spark-data:/opt/spark/work
    restart: unless-stopped

  # =========================================================================
  # PostgreSQL (Data Warehouse)
  # =========================================================================
  postgres:
    image: postgres:15-alpine
    hostname: postgres
    container_name: dep-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: warehouse
      POSTGRES_PASSWORD: warehouse_password
      POSTGRES_DB: analytics
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U warehouse -d analytics"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # =========================================================================
  # MinIO (S3-compatible Object Storage)
  # =========================================================================
  minio:
    image: minio/minio:latest
    hostname: minio
    container_name: dep-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # MinIO setup: create default buckets
  minio-init:
    image: minio/mc:latest
    container_name: dep-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing myminio/data-lake;
      mc mb --ignore-existing myminio/data-lake-staging;
      mc mb --ignore-existing myminio/data-lake-checkpoints;
      mc anonymous set download myminio/data-lake;
      echo 'MinIO buckets created.';
      exit 0;
      "

volumes:
  kafka-data:
    driver: local
  postgres-data:
    driver: local
  minio-data:
    driver: local
  spark-data:
    driver: local

networks:
  default:
    name: data-engineering-network
    driver: bridge
